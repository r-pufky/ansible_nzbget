---
###############################################################################
# NZBGet Role Options
###############################################################################
# Use Debian package for installation.
#
# Updates:
# * Version is determined by build version on release page (see all updates).
# * KEEP a separate change log as changes are made.
# * Use bare-metal docs to validate package/process changes.
# * Update defaults.
# * Update tests for any changes.
# * Standard validation testing (yamllint, ansible-lint, to-do, no-qa).
#
# Reference:
# * https://nzbget.com/
# * https://github.com/nzbgetcom/nzbget
# * https://nzbgetcom.github.io/#debian-repository

nzbget___release: "{{ {} | r_pufky.data.v3(

    _date='2026-03-21',
    _release='trixie',
    _version='v25.2',
  ) }}"

nzbget___app: "{{ {} | r_pufky.data.v3(

    _var_dir='/var/lib/nzbget',
    _cfg_dest='/var/lib/nzbget/nzbget.conf',
    _scripts_dest='/var/lib/nzbget/scripts',
    _drop_in='/etc/systemd/system/nzbget.service.d/override.conf',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

nzbget___packages:
  - 'nzbget'
  - 'unrar'  # Requires: contrib, non-free.
  - '7zip'  # Provides: 7zz.
  - 'p7zip-full'  # Provides: 7za.
  - 'rsync'  # ansible.posix.synchronize (script files).

nzbget___apt_sources:
  - name: 'nzbget'
    types:
      - 'deb'
    uris: 'https://nzbgetcom.github.io/deb'
    suites:
      - 'stable'
    components:
      - 'main'
    signed_by: 'https://nzbgetcom.github.io/nzbgetcom.asc'

# Debian APT sources to use if package install fails.
nzbget___apt_debian_all:
  - name: 'debian'
    types:
      - 'deb'
      - 'deb-src'
    uris: 'http://deb.debian.org/debian'
    suites:
      - 'trixie'
      - 'trixie-updates'
      - 'trixie-backports'
    components:
      - 'main'
      - 'contrib'
      - 'non-free'
      - 'non-free-firmware'
    signed_by: '/usr/share/keyrings/debian-archive-keyring.gpg'
  - name: 'debian-security'
    types:
      - 'deb'
      - 'deb-src'
    uris: 'http://deb.debian.org/debian-security'
    suites:
      - 'trixie-security'
    components:
      - 'main'
      - 'contrib'
      - 'non-free'
      - 'non-free-firmware'
    signed_by: '/usr/share/keyrings/debian-archive-keyring.gpg'

###############################################################################
# Default NZBGet User/Group
###############################################################################

nzbget___group:
  name: 'media'
  gid: 5555

nzbget___user:
  name: 'media'
  group: 'media'
  uid: 5555
  shell: '/usr/sbin/nologin'
  home: '/nonexistent'
  create_home: false
  password: '!'
  password_lock: true
  update_password: 'always'
  expires: -1
  system: true
