---
###############################################################################
# Feature Flags
###############################################################################

# 1. Automatically add Debian APT sources?
#
# Additional APT components (contrib, non-free, non-free-firmware) are required
# for NZBGet installation. Original sources.list is disabled.
#
# Alternatively all sources must be manually added outside of this role.
#
# Default: True.
nzbget_flg_apt_sources: true

# 2. Install application?
#
# Creates required default directories, users, install packages, download
# software, set minimal nzbget.conf if not specified, update and start
# services.
#
# Default: True.
nzbget_flg_install: true

# 3. Set configuration files?
#
# Files set using nzbget_cfg_*. Stops service and deploys user configuration,
# updates and starts services.
#
# Default: False.
nzbget_flg_config: false

# 4. Set permissions?
#
# Recursively create & set correct permissions from locations in nzbget.conf:
# * MainDir
# * DestDir
# * InterDir
# * NzbDir
# * QueueDir
# * TempDir
# * WebDir
# * ScriptDir
#
# Always use absolute paths (do not use ${} in path variables). Large file
# trees may take a long time. Must be modifiable by root user (e.g. NFS
# squashed mounts may fail). Locations in /var/lib/nzbget will always be set to
# the specified service user).
#
# Disable to create & set permissions outside of role.
#
# Default: False.
nzbget_flg_perms: false

###############################################################################
# Service
###############################################################################

# User that NZBGet will run under.
#
# 'media' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'media'.
nzbget_srv_user: 'media'

# Group that NZBGet will run under.
#
# 'media' will automatically be created using vars/main.yml if required.
# All other accounts are checked for existence.
#
# Default: 'media'.
nzbget_srv_group: 'media'

###############################################################################
# Config
###############################################################################

# Set nzbget.conf.
#
# Ansible controller path to source nzbget.conf (treated as a jinja2 template
# allowing for ansible variable interpretation). Overwrites existing
# /var/lib/nzbget/nzbget.conf.
#
# Special Case:
# * Use absolute paths for configuration file variables (Do not use ${}).
#
# nzbget_cfg_file: 'host_vars/nzb.example.com/config/nzbget.conf'
#
# Default: '' (use minimally configured default - files/default/nzbget.conf).
#
# Reference:
# * https://nzbget.com/documentation
nzbget_cfg_file: ''

# NZBGet extension scripts to set.
#
# Ansible controller path to source script files (treated as a jinja2 templates
# allowing for ansible variable interpretation). Overwrites existing
# /var/lib/nzbget/scripts/* files.
#
# Files not sourced will be removed.
#
# nzbget_script_dir: 'host_vars/nzb.example.com/config/scripts'
#
# Default: '' (disable).
#
# Reference:
# * https://nzbget.com/documentation
nzbget_cfg_scripts_dir: ''
